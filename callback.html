<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>ARQUION — Autenticando...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:#080e0a;color:#eef4f0;
     min-height:100vh;display:flex;align-items:center;justify-content:center;
     flex-direction:column;gap:16px;}
.logo{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;
      letter-spacing:8px;color:#3DAF6E;}
.sub{font-size:10px;letter-spacing:3px;color:#4a6055;}
.msg{font-size:12px;color:#6a8070;margin-top:6px;text-align:center;max-width:300px;}
.spinner{width:28px;height:28px;border:2px solid #1a2e20;border-top-color:#3DAF6E;
         border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="logo">ARQUION</div>
<div class="sub">Gestão Profissional</div>
<div class="spinner"></div>
<div class="msg" id="msg">Concluindo autenticação Microsoft...</div>
<script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
<script>
(async function(){
  var msg = document.getElementById('msg');
  try {
    var app = new msal.PublicClientApplication({
      auth: {
        clientId: 'f6baa180-c594-4b9b-aa3a-f62c09329c01',
        authority: 'https://login.microsoftonline.com/consumers',
        redirectUri: window.location.href.split('?')[0].split('#')[0]
      },
      cache: { cacheLocation: 'localStorage', storeAuthStateInCookie: false }
    });
    await app.handleRedirectPromise();
    msg.textContent = '✓ Conectado! Redirecionando para o sistema...';
    setTimeout(function(){ window.location.href = './index.html'; }, 1000);
  } catch(e) {
    msg.textContent = 'Erro ao autenticar: ' + e.message;
    setTimeout(function(){ window.location.href = './index.html'; }, 2500);
  }
})();
</script>
</body>
</html>
