<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARQUION — Autenticando...</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'DM Sans',sans-serif;
    background:#080e0a;
    color:#eef4f0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:20px;
  }
  .logo{
    font-family:'Cormorant Garamond',serif;
    font-size:28px;
    font-weight:600;
    letter-spacing:8px;
    color:#3DAF6E;
  }
  .sub{font-size:11px;letter-spacing:3px;color:#4a6055;margin-top:4px;}
  .msg{font-size:13px;color:#6a8070;margin-top:8px;}
  .spinner{
    width:32px;height:32px;
    border:2px solid #1a2e20;
    border-top-color:#3DAF6E;
    border-radius:50%;
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="logo">ARQUION</div>
<div class="sub">Gestão Profissional</div>
<div class="spinner"></div>
<div class="msg" id="msg">Concluindo autenticação Microsoft...</div>
<script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
<script>
(async()=>{
  const msg = document.getElementById('msg');
  try{
    const app = new msal.PublicClientApplication({
      auth:{
        clientId:'f6baa180-c594-4b9b-aa3a-f62c09329c01',
        authority:'https://login.microsoftonline.com/consumers',
        redirectUri:window.location.href.split('?')[0]
      },
      cache:{cacheLocation:'localStorage',storeAuthStateInCookie:false}
    });
    await app.handleRedirectPromise();
    msg.textContent = '✓ Conectado! Redirecionando...';
    setTimeout(()=>{ window.location.href='./index.html'; }, 1000);
  } catch(e){
    msg.textContent = 'Erro: '+e.message+' — Voltando...';
    setTimeout(()=>{ window.location.href='./index.html'; }, 2500);
  }
})();
</script>
</body>
</html>
